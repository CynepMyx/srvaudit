name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # Required for OIDC trusted publishing

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/srvaudit
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed - uses OIDC trusted publishing
        # Configure at: https://pypi.org/manage/project/srvaudit/settings/publishing/

  github-release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract section between this version header and the next one
          NOTES=$(awk "/^## \[?${VERSION}/ {found=1; next} /^## / {if(found) exit} found {print}" CHANGELOG.md 2>/dev/null || echo "Release ${TAG}")
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            dist/*

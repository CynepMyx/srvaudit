name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration" --timeout=30 -v

  integration:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"

      - name: Start sshd container
        run: |
          docker run -d --name sshd-test \
            -p 2222:22 \
            -e SSH_ENABLE_ROOT=true \
            panubo/sshd:latest
          # Wait for sshd to be ready
          for i in $(seq 1 15); do
            if docker exec sshd-test pgrep sshd > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          # Create test user with key auth
          docker exec sshd-test sh -c '
            adduser -D testuser
            echo "testuser:testpass" | chpasswd
            mkdir -p /home/testuser/.ssh
            chmod 700 /home/testuser/.ssh
          '
          # Generate and install SSH key
          ssh-keygen -t ed25519 -f /tmp/test_key -N "" -q
          docker cp /tmp/test_key.pub sshd-test:/home/testuser/.ssh/authorized_keys
          docker exec sshd-test chown -R testuser:testuser /home/testuser/.ssh
          docker exec sshd-test chmod 600 /home/testuser/.ssh/authorized_keys

      - name: Run integration tests
        env:
          SRVAUDIT_TEST_HOST: localhost
          SRVAUDIT_TEST_PORT: "2222"
          SRVAUDIT_TEST_USER: testuser
          SRVAUDIT_TEST_KEY: /tmp/test_key
        run: pytest -m integration --timeout=60 -v

      - name: Cleanup
        if: always()
        run: docker rm -f sshd-test || true

  smoke:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Install from wheel in clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
      - name: Smoke test
        run: |
          /tmp/smoke-venv/bin/srvaudit --help
          /tmp/smoke-venv/bin/python -c "import srvaudit; print(srvaudit.__name__)"

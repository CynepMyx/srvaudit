name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration" --timeout=30 -v

  # integration:
  #   Uncomment when integration tests with @pytest.mark.integration exist
  #   runs-on: ubuntu-latest
  #   needs: [lint, test]
  #   See ci.yml.integration-template for full config

  smoke:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Install from wheel in clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
      - name: Smoke test
        run: |
          /tmp/smoke-venv/bin/srvaudit --help
          /tmp/smoke-venv/bin/python -c "import srvaudit; print(srvaudit.__name__)"
